name: Release

# Push a version tag to cut a release with prebuilt binaries:
#   git tag vX.Y.Z && git push origin vX.Y.Z   (must match Cargo.toml and plugin.json versions)

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify tag matches Cargo.toml version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          grep -q "^version = \"${REF_NAME#v}\"$" Cargo.toml || {
            echo "Tag $REF_NAME does not match Cargo.toml version"; exit 1; }
          grep -q "\"version\": \"${REF_NAME#v}\"" .claude-plugin/plugin.json || {
            echo "Tag $REF_NAME does not match plugin.json version"; exit 1; }
      - run: cargo test
      - name: Create the GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$REF_NAME" >/dev/null 2>&1 \
            || gh release create "$REF_NAME" \
                 --title "$REF_NAME" \
                 --generate-notes \
                 --verify-tag

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Both macOS targets build on the Apple Silicon runner: aarch64 natively
          # and x86_64 by cross-compile. Avoids the scarce macos-13 Intel runners.
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dir="gui-tool-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/gui-tool" "$dir/"
          cp README.md LICENSE "$dir/"
          tar czf "$dir.tar.gz" "$dir"
          echo "ASSET=$dir.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          dir="gui-tool-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/gui-tool.exe" "$dir/"
          cp README.md LICENSE "$dir/"
          7z a "$dir.zip" "$dir" >/dev/null
          echo "ASSET=$dir.zip" >> "$GITHUB_ENV"

      - name: Upload asset to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: gh release upload "$REF_NAME" "$ASSET" --clobber
